name: CloudSec Terraform Deploy (Access Keys)

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        type: choice
        description: Select Terraform action
        options:
          - plan
          - apply
          - destroy
        required: true

jobs:
  # ── PLAN ────────────────────────────────────────────────────────────────────
  # Always runs first. Saves the plan as an artifact so apply uses
  # exactly what was reviewed — not a fresh plan with potential drift.
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    defaults:
      run:
        working-directory: ./source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: source/tfplan
          retention-days: 1

  # ── APPLY ───────────────────────────────────────────────────────────────────
  # Only runs when action = apply. Requires manual approval via GitHub
  # Environments before executing. Uses the saved plan from the plan job.
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ github.event.inputs.terraform_action == 'apply' }}
    environment: production   # Configure this environment in GitHub to require a reviewer
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    defaults:
      run:
        working-directory: ./source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: source/

      - name: Terraform Apply (saved plan)
        run: terraform apply -auto-approve tfplan

  # ── DESTROY ─────────────────────────────────────────────────────────────────
  # Destroy is a separate job that does NOT depend on the plan job.
  # It requires the "destroy-approval" environment which should be configured
  # in GitHub to require a reviewer — preventing accidental one-click destroys.
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.terraform_action == 'destroy' }}
    environment: destroy-approval   # Configure this environment to require a reviewer
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    defaults:
      run:
        working-directory: ./source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
